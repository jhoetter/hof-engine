name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint
        run: |
          ruff check hof/ tests/
          ruff format --check hof/ tests/

      - name: Test
        run: pytest tests/ -m "not integration" -v

  release:
    name: Bump, Tag & Publish
    needs: check
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if current commit already tagged
        id: check_tag
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.check_tag.outputs.already_tagged == 'false'
        id: bump
        run: |
          LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="0.1.0"
          else
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing $NEW_VERSION"

      - name: Update pyproject.toml version
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.bump.outputs.new_version }}\"/" pyproject.toml

      - name: Commit version bump
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Tag and push
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

      - name: Set up Python
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and publish
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          pip install hatch twine
          hatch build
          twine check dist/*

      - name: Publish to PyPI
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
