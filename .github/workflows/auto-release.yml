name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint
        run: |
          ruff check hof/ tests/
          ruff format --check hof/ tests/

      - name: Test
        run: pytest tests/ -m "not integration" -v

  release:
    name: Bump, Tag & Publish
    needs: check
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if current commit already tagged
        id: check_tag
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync main, bump version, commit, push
        if: steps.check_tag.outputs.already_tagged == 'false'
        id: bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Apply one release bump on top of latest origin/main (avoids commit-then-rebase
          # conflicts when main moved and pyproject.toml changed).
          release_commit_push() {
            git fetch origin main --tags
            git merge origin/main --no-edit
            LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
            if [ -z "$LATEST_TAG" ]; then
              NEW_VERSION="0.1.0"
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi
            echo "Releasing ${NEW_VERSION}"
            sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" pyproject.toml
            git add pyproject.toml
            if git diff --cached --quiet; then
              echo "ERROR: expected pyproject.toml version change"
              exit 1
            fi
            git commit -m "chore: bump to ${NEW_VERSION} [skip ci]"
            git push origin HEAD:main
            echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          }

          if ! release_commit_push; then
            echo "First attempt failed (e.g. non-fast-forward); reset to origin/main and retry once"
            git fetch origin main --tags
            git reset --hard origin/main
            release_commit_push || exit 1
          fi

      - name: Tag and push
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

      - name: Set up Python
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and publish
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          pip install hatch twine
          hatch build
          twine check dist/*

      - name: Publish to PyPI
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
